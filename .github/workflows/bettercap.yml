---
name: "🦞 Build and release Bettercap Hackpack"

on:
  push:               { branches: ["main"], paths: ["bettercap/**"] }
  schedule:           [{ cron: "0 0 1 * *" }]
  workflow_dispatch:

jobs:

  bundle-bettercap:
    name: "📦 Bundle Bettercap caplets"
    runs-on: "ubuntu-latest"

    steps:
      - name: "📥 Checkout code"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 1

      - name: "🗜️ Zip Bettercap caplets"
        run: "/usr/bin/zip -r /tmp/bettercap-caplets ./bettercap/caplets/"

      - name: "📤 Upload Bettercap artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "bettercap-caplets"
          path: "/tmp/bettercap-caplets.zip"
          if-no-files-found: "error"
...
