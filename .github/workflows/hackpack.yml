---
name: "🎒 Hackpack"

on:
  push:         { branches: ["main"] }
  schedule:     [{ cron: "0 0 1 * *" }]
  workflow_dispatch:

jobs:

  # -------------------------------------------------
  #       CSharp (C#) Build
  # -------------------------------------------------

  csharp:
    name: "🔨 Compile ${{ matrix.project }}"
    runs-on: "windows-2022"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: "Certify"     }
          - { project: "GodPotato",   platform: "AnyCPU" }
          - { project: "Inveigh",     self_contained: true, framework: "net10.0" }
          - { project: "Rubeus"      }
          - { project: "Seatbelt"    }
          - { project: "SharPersist", packages: "Costura.Fody:3.3.3 TaskScheduler:2.8.11" }
          - { project: "SharpUp"     }

    steps:
      - name: "📥 Checkout code"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 1
          submodules: "recursive"

      - name: "🔧 Setup MSBuild"
        if: "!matrix.self_contained"
        uses: "microsoft/setup-msbuild@v3"

      - name: "📦 Setup NuGet"
        if: "!matrix.self_contained"
        uses: "NuGet/setup-nuget@v3"

      - name: "🛠️ Install .NET 4.0 Framework"
        if: "!matrix.self_contained"
        run: |-
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.NETFramework.ReferenceAssemblies.net40/1.0.3" -OutFile "${env:temp}\net4.zip"
          Expand-Archive -Force -LiteralPath "${env:temp}\net4.zip" -DestinationPath "${env:temp}\net4"
          [IO.Directory]::Delete("v4.0", $True)
          Move-Item -Force -LiteralPath "${env:temp}\net4\build\.NETFramework\v4.0" -Destination "."
        working-directory: "C:/Program Files (x86)/Reference Assemblies/Microsoft/Framework/.NETFramework"

      - name: "🔄 Restore NuGet packages"
        if: "!matrix.self_contained"
        run: |
          if (Test-Path "${{ matrix.project }}.sln") { nuget restore "${{ matrix.project }}.sln" }
        working-directory: "windows/${{ matrix.project }}"

      - name: "📋 Install project-specific dependencies"
        if: "!matrix.self_contained && matrix.packages"
        run: |
          New-Item -ItemType Directory -Path ".\packages" -Force
          '${{ matrix.packages }}'.Split(' ') | ForEach-Object {
            $parts = $_.Split(':')
            nuget install $parts[0] -Version $parts[1] -Source 'https://api.nuget.org/v3/index.json' -OutputDirectory '.\packages'
          }
        working-directory: "windows/${{ matrix.project }}"

      - name: "🏗️ Build solution"
        if: "!matrix.self_contained"
        env:
          PLATFORM: ${{ matrix.platform || 'Any CPU' }}
        run: |
          $target = if (Test-Path "${{ matrix.project }}.sln") { "${{ matrix.project }}.sln" } else { "${{ matrix.project }}.csproj" }
          $buildArgs = @('/m', '/t:Build', '/p:Configuration=Release', "/p:Platform=$env:PLATFORM", $target)
          msbuild @buildArgs
          New-Item -ItemType Directory -Path ".\bundle" -Force
          Get-ChildItem -Recurse -Filter *.exe | ForEach-Object { Move-Item $_.FullName .\bundle\ -Force }
          Get-ChildItem -Path "bin\Release" -Filter *.dll -ErrorAction SilentlyContinue | ForEach-Object { Move-Item $_.FullName .\bundle\ -Force }
          if (Test-Path "..\PowerSharpPack\PowerSharpBinaries\Invoke-${{ matrix.project }}.ps1") {
            Move-Item "..\PowerSharpPack\PowerSharpBinaries\Invoke-${{ matrix.project }}.ps1" .\bundle\ -Force
          }
        working-directory: "windows/${{ matrix.project }}"

      - name: "🏗️ Publish self-contained executable"
        if: "matrix.self_contained"
        env:
          FRAMEWORK: ${{ matrix.framework || '' }}
          PROJECT: ${{ matrix.project }}
        run: |
          $csproj = "$env:PROJECT\$env:PROJECT.csproj"
          $fArg = if ($env:FRAMEWORK) { @('-f', $env:FRAMEWORK) } else { @() }
          dotnet publish $csproj -c Release -r win-x64 -p:PublishOption=TrimmedSingle -o bundle/ @fArg
        working-directory: "windows/${{ matrix.project }}"

      - name: "📤 Upload artifact"
        uses: "actions/upload-artifact@v4"
        with:
          name: "${{ matrix.project }}"
          path: "windows/${{ matrix.project }}/bundle/"
          if-no-files-found: "error"

  # -------------------------------------------------
  #       PowerShell (PWSH) Scripts
  # -------------------------------------------------

  powershell:
    name: "📜 PowerShell ${{ matrix.project }}"
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        project:
          - "Get-ServiceACL"
          - "MailSniper"
          - "Powercat"
          - "PowerLurk"
          - "PowerSharpPack"
          - "PowerSploit"

    steps:
      - name: "📥 Checkout code"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 1
          submodules: "recursive"

      - name: "📋 Collect PowerShell scripts"
        run: |
          mkdir -p "/tmp/${{ matrix.project }}"
          find . -type f -name '*.ps1' -exec mv {} "/tmp/${{ matrix.project }}/" \;
        working-directory: "windows/${{ matrix.project }}"

      - name: "📤 Upload artifact"
        uses: "actions/upload-artifact@v4"
        with:
          name: "${{ matrix.project }}"
          path: "/tmp/${{ matrix.project }}/"
          if-no-files-found: "error"

  # -------------------------------------------------
  #       Bettercap Caplets
  # -------------------------------------------------

  bettercap:
    name: "🦞 Bundle Bettercap caplets"
    runs-on: "ubuntu-latest"
    needs: ["csharp", "powershell"]

    steps:
      - name: "📥 Checkout code"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 1
          sparse-checkout: "bettercap/"

      - name: "🗜️ Zip Bettercap caplets"
        run: "/usr/bin/zip -r /tmp/bettercap-caplets.zip ./bettercap/caplets/"

      - name: "📤 Upload artifact"
        uses: "actions/upload-artifact@v4"
        with:
          name: "bettercap-caplets"
          path: "/tmp/bettercap-caplets.zip"
          if-no-files-found: "error"

  # -------------------------------------------------
  #       Release
  # -------------------------------------------------

  release:
    name: "🚀 Create Release"
    runs-on: "ubuntu-latest"
    needs: ["bettercap"]
    permissions:
      contents: "write"

    steps:
      - name: "📥 Checkout code"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 1
          sparse-checkout: ".github/"

      - name: "📥 Download all artifacts"
        uses: "actions/download-artifact@v4"
        with:
          path: "/tmp/artifacts/"
          pattern: "*"
          merge-multiple: false

      - name: "🗜️ Zip Windows bundle"
        run: "/usr/bin/zip -r /tmp/hackpack-windows.zip . --exclude './bettercap-caplets/*'"
        working-directory: "/tmp/artifacts/"

      - name: "✂️ Strip logo from release notes"
        run: |
          sed '/^<!--/,/^-->/d; /^<div/,/^<\/div>/{ /^## /!d }' .github/README.md > /tmp/release-notes.md

      - name: "🗑️ Cleanup old releases"
        uses: "jay2610/delete-older-releases@1.4.0"
        with:
          keep_latest: 0
          delete_tags: true
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: "🚀 Create GitHub Release"
        uses: "softprops/action-gh-release@v3"
        with:
          name: "🎒 Hackpack!"
          tag_name: "latest"
          body_path: "/tmp/release-notes.md"
          make_latest: true
          files: |-
            /tmp/hackpack-windows.zip
            /tmp/artifacts/bettercap-caplets/bettercap-caplets.zip
          draft: false
          prerelease: false
          token: "${{ secrets.GITHUB_TOKEN }}"
...
